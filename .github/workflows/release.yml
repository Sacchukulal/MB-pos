name: Release

# Windows-only signed release, triggered by pushing a v* tag on MB-pos.
# Builds the NSIS installer + updater artifacts and publishes them to the
# PUBLIC repo Sacchukulal/MB-pos-releases (this code repo stays private —
# installed apps fetch latest.json anonymously from the public repo).
# RELEASES_TOKEN: PAT with write access to MB-pos-releases.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          owner: Sacchukulal
          repo: MB-pos-releases
          tagName: v__VERSION__
          releaseName: 'Magic Bill v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
